<!DOCTYPE html> 
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
        }

        .calculator {
            background-color: #1e1e24;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 60px;
            background-color: #2d2d34;
            border: none;
            outline: none;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.8rem;
            text-align: right;
            padding: 0 15px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 55px;
            border: none;
            border-radius: 8px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-number {
            background-color: #3a3a42;
            color: #fff;
        }

        .btn-number:hover {
            background-color: #4a4a54;
        }

        .btn-operator {
            background-color: #ff9f0a;
            color: #fff;
        }

        .btn-operator:hover {
            background-color: #cc7f08;
        }

        .btn-clear {
            background-color: #ff3b30;
            color: #fff;
            grid-column: span 2;
        }

        .btn-clear:hover {
            background-color: #d32f2f;
        }

        .btn-equal {
            background-color: #34c759;
            color: #fff;
            grid-column: span 2;
        }

        .btn-equal:hover {
            background-color: #28a745;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">
        
        <div class="buttons">
            <button class="btn-clear" onclick="clearDisplay()">C</button>
            <button class="btn-operator" onclick="appendOperator('/')">/</button>
            <button class="btn-operator" onclick="appendOperator('*')">x</button>

            <button class="btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn-operator" onclick="appendOperator('-')">-</button>

            <button class="btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn-operator" onclick="appendOperator('+')">+</button>

            <button class="btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn-number" onclick="appendNumber('0')">0</button>

            <button class="btn-equal" onclick="calculateResult()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendNumber(number) {
            if (display.value === '0') {
                display.value = number;
            } else {
                display.value += number;
            }
        }

        function appendOperator(operator) {
            const lastChar = display.value.slice(-1);
            // Mencegah user memasukkan operator ganda berturut-turut
            if (['+', '-', '*', '/'].includes(lastChar)) {
                display.value = display.value.slice(0, -1) + operator;
            } else if (display.value !== '') {
                display.value += operator;
            }
        }

        function clearDisplay() {
            display.value = '';
        }

        function calculateResult() {
            try {
                // Menggunakan eval untuk kalkulasi ekspresi string matematika sederhana
                if (display.value !== '') {
                    display.value = eval(display.value);
                }
            } catch (error) {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
